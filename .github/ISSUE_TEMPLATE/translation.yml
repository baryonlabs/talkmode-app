name: Translation fix
description: Improve a translation in READMEs/ or the app's 20-language UI
title: "[i18n]: "
labels: ["translation"]
body:
  - type: markdown
    attributes:
      value: |
        TalkMode ships in 20 languages. If something reads awkwardly or is wrong,
        a quick issue here is a great first contribution.
  - type: input
    id: language
    attributes:
      label: Language
      placeholder: e.g. 日本語 / Français / العربية
    validations:
      required: true
  - type: input
    id: location
    attributes:
      label: Where is it?
      description: A file in READMEs/, or a screen/label in the app.
      placeholder: e.g. READMEs/README.ja.md — "Install" section
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current text
    validations:
      required: true
  - type: textarea
    id: suggested
    attributes:
      label: Suggested text
    validations:
      required: true
