<style>
  :root { --teal:#3ebbae; --blue:#286bc6; --ink:#18202f; --muted:#5b6577; --line:#e6eaf0; --soft:#f6f8fb; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink); line-height: 1.65; -webkit-font-smoothing: antialiased; background: #fff;
  }
  a { color: var(--blue); text-decoration: none; }
  a:hover { text-decoration: underline; }

  header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(255,255,255,0.9); backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
  }
  .nav { display: flex; align-items: center; gap: 12px; padding: 13px 24px; max-width: 1000px; margin: 0 auto; }
  .brand { display: flex; align-items: center; gap: 9px; font-weight: 700; font-size: 17px; color: var(--ink); }
  .brand img { width: 28px; height: 28px; }
  .nav .spacer { flex: 1; }
  .nav a.home { font-size: 14px; font-weight: 500; color: var(--muted); }

  .langbar { border-bottom: 1px solid var(--line); background: var(--soft); }
  .langbar .inner {
    max-width: 1000px; margin: 0 auto; padding: 11px 24px;
    display: flex; flex-wrap: wrap; gap: 4px 14px; font-size: 13.5px;
  }
  .langbar a { color: var(--muted); white-space: nowrap; }
  .langbar a.active { color: var(--ink); font-weight: 700; }

  main { max-width: 880px; margin: 0 auto; padding: 40px 24px 90px; }
  #doc img { max-width: 100%; height: auto; border-radius: 8px; }
  #doc h1 { font-size: 30px; letter-spacing: -0.02em; margin: 28px 0 14px; }
  #doc h2 { font-size: 23px; letter-spacing: -0.01em; margin: 36px 0 12px; padding-bottom: 6px; border-bottom: 1px solid var(--line); }
  #doc h3 { font-size: 18px; margin: 24px 0 8px; }
  #doc p, #doc ul, #doc ol, #doc blockquote, #doc table, #doc pre { margin: 12px 0; }
  #doc ul, #doc ol { padding-left: 26px; }
  #doc li { margin: 4px 0; }
  #doc code {
    background: var(--soft); border: 1px solid var(--line); border-radius: 5px;
    padding: 1px 6px; font-size: 0.88em; font-family: "SF Mono", Menlo, Consolas, monospace;
  }
  #doc pre {
    background: #141a26; color: #e8edf5; border-radius: 10px; padding: 16px 18px; overflow-x: auto;
  }
  #doc pre code { background: none; border: 0; padding: 0; color: inherit; font-size: 13px; }
  #doc blockquote { border-left: 3px solid var(--teal); padding: 4px 16px; color: var(--muted); }
  #doc table { border-collapse: collapse; width: 100%; font-size: 14px; display: block; overflow-x: auto; }
  #doc th, #doc td { border: 1px solid var(--line); padding: 8px 12px; text-align: left; }
  #doc th { background: var(--soft); }
  #doc hr { border: 0; border-top: 1px solid var(--line); margin: 32px 0; }
  #doc a { word-break: break-word; }
  .status { color: var(--muted); padding: 60px 0; text-align: center; }
</style>

</head>
<body>

<header>
  <nav class="nav">
    <a class="brand" href="/"><img src="/favicon.svg" alt="" />TalkMode</a>
    <span class="spacer"></span>
    <a class="home" href="/">&larr; Back to home</a>
  </nav>
</header>

<div class="langbar"><div class="inner" id="langbar"></div></div>

<main>
  <article id="doc"><p class="status">Loading…</p></article>
</main>

<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<script>
  var LANGS = [
    ["ko","한국어"],["en","English"],["ja","日本語"],["zh-CN","简体中文"],["zh-TW","繁體中文"],
    ["es","Español"],["fr","Français"],["de","Deutsch"],["it","Italiano"],["pt","Português"],
    ["ru","Русский"],["ar","العربية"],["hi","हिन्दी"],["id","Bahasa Indonesia"],["vi","Tiếng Việt"],
    ["th","ภาษาไทย"],["tr","Türkçe"],["nl","Nederlands"],["pl","Polski"],["sv","Svenska"]
  ];
  var valid = LANGS.map(function (l) { return l[0]; });

  function currentLang() {
    var q = new URLSearchParams(location.search).get("lang");
    return valid.indexOf(q) !== -1 ? q : "en";
  }

  function buildLangbar(active) {
    document.getElementById("langbar").innerHTML = LANGS.map(function (l) {
      var cls = l[0] === active ? ' class="active"' : "";
      return '<a' + cls + ' href="?lang=' + l[0] + '">' + l[1] + "</a>";
    }).join("");
  }

  // Rewrite repo-relative paths so the docs work fully self-hosted, and drop the
  // GitHub-data badges (release / stars) that can't resolve while the repo is private.
  function normalize(md) {
    return md
      .replace(/(\.\.\/)?docs\/screenshots\//g, "/screenshots/")
      .replace(/href="\.\.\/README\.md"/g, 'href="?lang=en"')
      .replace(/href="(?:readme\/)?README\.([A-Za-z-]+)\.md"/g, 'href="?lang=$1"')
      .replace(/\[!\[[^\]]*\]\(https:\/\/img\.shields\.io\/github\/[^)]*\)\]\([^)]*\)\n?/g, "")
      .replace(/<a[^>]*>\s*<img[^>]*img\.shields\.io\/github\/[^>]*>\s*<\/a>/g, "");
  }

  function load(lang) {
    buildLangbar(lang);
    document.documentElement.lang = lang;
    document.dir = lang === "ar" ? "rtl" : "ltr";
    fetch("/readme/README." + lang + ".md")
      .then(function (r) { if (!r.ok) throw new Error(r.status); return r.text(); })
      .then(function (md) {
        document.getElementById("doc").innerHTML = marked.parse(normalize(md));
      })
      .catch(function () {
        document.getElementById("doc").innerHTML =
          '<p class="status">Could not load this language. <a href="?lang=en">Read in English</a>.</p>';
      });
  }

  load(currentLang());
</script>
</body>
</html>
